<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#060a0f"/>

  <!-- Screen bezel -->
  <rect x="8" y="10" width="48" height="34" rx="4" fill="#0c1219" stroke="#00e5a0" stroke-width="1.5"/>

  <!-- Scanlines (subtle) -->
  <rect x="8" y="10" width="48" height="34" rx="4" fill="url(#scanlines)" opacity="0.15"/>

  <!-- Terminal prompt line 1 -->
  <rect x="14" y="18" width="6" height="2.5" rx="1" fill="#00e5a0"/>
  <rect x="22" y="18" width="18" height="2.5" rx="1" fill="#627d98"/>
  <rect x="42" y="18" width="8" height="2.5" rx="1" fill="#334e68"/>

  <!-- Terminal prompt line 2 -->
  <rect x="14" y="24" width="6" height="2.5" rx="1" fill="#00e5a0"/>
  <rect x="22" y="24" width="12" height="2.5" rx="1" fill="#627d98"/>
  <rect x="36" y="24" width="14" height="2.5" rx="1" fill="#00b07a" opacity="0.7"/>

  <!-- Terminal prompt line 3 -->
  <rect x="14" y="30" width="6" height="2.5" rx="1" fill="#00e5a0"/>
  <rect x="22" y="30" width="8" height="2.5" rx="1" fill="#627d98"/>

  <!-- Cursor blink -->
  <rect x="32" y="30" width="4" height="2.5" rx="0.5" fill="#00e5a0" opacity="0.9"/>

  <!-- Stat bars at bottom of screen -->
  <rect x="14" y="36" width="36" height="1.5" rx="0.75" fill="#0d1b2a"/>
  <rect x="14" y="36" width="28" height="1.5" rx="0.75" fill="#00e5a0" opacity="0.6"/>

  <!-- Screen stand -->
  <rect x="28" y="44" width="8" height="3" rx="1" fill="#1e3a4c"/>
  <rect x="22" y="47" width="20" height="2.5" rx="1.5" fill="#1e3a4c"/>

  <!-- Dot indicators bottom bar -->
  <circle cx="24" cy="55" r="2.5" fill="#00e5a0"/>
  <circle cx="32" cy="55" r="2.5" fill="#1e3a4c"/>
  <circle cx="40" cy="55" r="2.5" fill="#1e3a4c"/>

  <defs>
    <pattern id="scanlines" x="0" y="0" width="1" height="4" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="1" height="2" fill="#000"/>
      <rect x="0" y="2" width="1" height="2" fill="transparent"/>
    </pattern>
  </defs>
</svg>
